<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda J4S Music Records</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #ff9a9e;
            --secondary-color: #fecfef;
            --bg-color: #fffafb;
            --text-color: #5c4b51;
            --accent-color: #a1c4fd;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Quicksand', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); }

        header {
            background-color: white;
            padding: 1rem 5%;
            text-align: center;
            box-shadow: 0 4px 15px rgba(255, 154, 158, 0.1);
        }

        .logo { font-size: 1.5rem; font-weight: 700; color: var(--primary-color); text-decoration: none; }

        .container { padding: 40px 5%; max-width: 1200px; margin: auto; }
        
        .section-title {
            text-align: center;
            font-size: 2.2rem;
            margin-bottom: 30px;
            color: var(--primary-color);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .card {
            background: white;
            border-radius: 25px;
            padding: 20px;
            text-align: center;
            border: 2px dashed var(--secondary-color);
            transition: 0.3s;
        }

        .card:hover { transform: translateY(-5px); border-color: var(--primary-color); }

        .card img { width: 100%; border-radius: 15px; height: 200px; object-fit: cover; margin-bottom: 15px; }
        
        .price { color: var(--accent-color); font-weight: 700; font-size: 1.2rem; margin: 10px 0; }

        .btn {
            background: var(--primary-color);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            text-decoration: none;
            display: inline-block;
            font-weight: 700;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">✨ J4S Music Records ✨</a>
</header>

<div class="container">
    <h2 class="section-title">Nuestros Beats (Trap & Reggaetón)</h2>
    <div class="grid">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1516280440614-37939bbacd81?q=80&w=500" alt="Beat">
            <h3>Detroit Style Trap</h3>
            <p class="price">$25.00 USD</p>
            <a href="#" class="btn">Obtener Beat 🎧</a>
        </div>
        <div class="card">
            <img src="https://images.unsplash.com/photo-1514525253161-7a46d19cd819?q=80&w=500" alt="Beat">
            <h3>Reggaetón Flow</h3>
            <p class="price">$30.00 USD</p>
            <a href="#" class="btn">Obtener Beat 🔥</a>
        </div>
    </div>

    <h2 class="section-title" style="margin-top: 50px;">Libros Exclusivos</h2>
    <div class="grid">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1544947950-fa07a98d237f?q=80&w=500" alt="Libro">
            <h3>Soy el crush de mi crush</h3>
            <p style="font-size: 0.9rem;">Psicología y marketing personal.</p>
            <p class="price">$12.00 USD</p>
            <a href="#" class="btn">Comprar E-book 📖</a>
        </div>
    </div>
</div>

</body>
</html>
